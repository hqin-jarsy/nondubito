<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Dark green circle background -->
  <circle cx="32" cy="32" r="32" fill="#1e4035"/>
  <!-- Subtle inner ring -->
  <circle cx="32" cy="32" r="28" fill="none" stroke="#b08d57" stroke-width="1"/>
  <!-- "N" letter in gold, slightly left of center -->
  <text
    x="17"
    y="43"
    font-family="Georgia, 'EB Garamond', serif"
    font-size="30"
    font-weight="400"
    fill="#b08d57"
    letter-spacing="-1"
  >N</text>
  <!-- "D" letter in cream, slightly right and overlapping -->
  <text
    x="32"
    y="43"
    font-family="Georgia, 'EB Garamond', serif"
    font-size="30"
    font-weight="400"
    fill="#f5f0e8"
    letter-spacing="-1"
  >D</text>
</svg>
